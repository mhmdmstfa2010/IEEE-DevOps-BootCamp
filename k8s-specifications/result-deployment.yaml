apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:5cf43a603a6a3c1a8217cf0072bb2fb811cf7edf

        name: result
        ports:
        - containerPort: 80
          name: result
