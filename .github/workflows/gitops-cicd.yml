name: GitOps CI (ArgoCD Pull Deploy)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-update-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        uses: docker/build-push-action@v6
        with:
          context: ./vote
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ github.sha }}

      - name: Build and push result image
        uses: docker/build-push-action@v6
        with:
          context: ./result
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/result:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/result:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ github.sha }}

      - name: Update Kubernetes manifests with new tags
        run: |
          sed -i "s|image: .*vote.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ github.sha }}|g" k8s-specifications/vote-deployment.yaml
          sed -i "s|image: .*result.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/result:${{ github.sha }}|g" k8s-specifications/result-deployment.yaml
          sed -i "s|image: .*worker.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ github.sha }}|g" k8s-specifications/worker-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-specifications/vote-deployment.yaml k8s-specifications/result-deployment.yaml k8s-specifications/worker-deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git commit -m "chore(gitops): update images to ${{ github.sha }}"
          git push
