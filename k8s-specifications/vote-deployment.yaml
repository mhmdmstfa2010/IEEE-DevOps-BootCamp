apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:ea3887a4a730da44a0eaa918f93e0dca45a55de6
        name: vote
        ports:
        - containerPort: 80
          name: vote
