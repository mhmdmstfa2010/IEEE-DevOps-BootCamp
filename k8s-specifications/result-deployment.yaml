apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:ca0ce6d9e074f71c4365463aa46f9355561e6ab1
        name: result
        ports:
        - containerPort: 80
          name: result
