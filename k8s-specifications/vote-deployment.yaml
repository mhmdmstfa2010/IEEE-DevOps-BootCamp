apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:5cf43a603a6a3c1a8217cf0072bb2fb811cf7edf
        name: vote
        ports:
        - containerPort: 80
          name: vote
