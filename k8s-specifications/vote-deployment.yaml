apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:ca0ce6d9e074f71c4365463aa46f9355561e6ab1
        name: vote
        ports:
        - containerPort: 80
          name: vote
