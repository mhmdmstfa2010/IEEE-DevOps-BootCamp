apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:f2f10e4c98ca89421f9f5a035bee38691ec4a8ff
        name: vote
        ports:
        - containerPort: 80
          name: vote
