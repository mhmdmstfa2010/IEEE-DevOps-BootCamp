apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:21887486c2564f428c6cafc3317fd605975e9275

        name: result
        ports:
        - containerPort: 80
          name: result
