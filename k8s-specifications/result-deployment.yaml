apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:be323b746bcc8832009f4ad1fdbc34266bb4005d

        name: result
        ports:
        - containerPort: 80
          name: result
