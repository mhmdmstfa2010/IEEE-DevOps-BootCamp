apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:f1e2a8213a2624a1a257e9203a99a5f30fdc88a6

        name: result
        ports:
        - containerPort: 80
          name: result
