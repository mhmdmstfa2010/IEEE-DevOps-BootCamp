apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:ea3887a4a730da44a0eaa918f93e0dca45a55de6

        name: result
        ports:
        - containerPort: 80
          name: result
