apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:be323b746bcc8832009f4ad1fdbc34266bb4005d
        name: vote
        ports:
        - containerPort: 80
          name: vote
