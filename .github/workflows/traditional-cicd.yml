name: Traditional CI/CD (Build to Running Cluster)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        uses: docker/build-push-action@v6
        with:
          context: ./vote
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ github.sha }}

      - name: Build and push result image
        uses: docker/build-push-action@v6
        with:
          context: ./result
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/result:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/result:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.1.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Create namespace if missing
        run: kubectl get namespace vote || kubectl create namespace vote

      - name: Apply full Kubernetes manifests
        run: kubectl apply -f k8s-specifications/ -n vote

      - name: Deploy latest app images directly (traditional CD)
        run: |
          kubectl -n vote set image deployment/vote vote=${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ github.sha }}
          kubectl -n vote set image deployment/result result=${{ secrets.DOCKERHUB_USERNAME }}/result:${{ github.sha }}
          kubectl -n vote set image deployment/worker worker=${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ github.sha }}

      - name: Wait for all deployments to be healthy
        run: |
          kubectl -n vote rollout status deployment/redis
          kubectl -n vote rollout status deployment/db
          kubectl -n vote rollout status deployment/vote
          kubectl -n vote rollout status deployment/result
          kubectl -n vote rollout status deployment/worker

      - name: Verify services are exposed
        run: kubectl -n vote get svc
