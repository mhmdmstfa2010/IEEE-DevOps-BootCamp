apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: mohamed710/result:f2f10e4c98ca89421f9f5a035bee38691ec4a8ff

        name: result
        ports:
        - containerPort: 80
          name: result
