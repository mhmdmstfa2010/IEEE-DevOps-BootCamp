apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: mohamed710/vote:7a3f40231f80dbae9a01755f5ef26563b1180d19
        name: vote
        ports:
        - containerPort: 80
          name: vote
